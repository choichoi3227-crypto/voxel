<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VOXEL Shop</title><style>body{background:#0b0b12;color:#eee;font-family:system-ui;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{border:1px solid #553;background:#181520;border-radius:12px;padding:14px}button,input{padding:10px;border-radius:8px;background:#22172a;color:#fff;border:1px solid #765}</style><h1>상점</h1><nav><a href="/">게임</a> · <a href="/mypage.html">마이페이지</a> · <a href="/servers.html">서버</a></nav><p>플레이/킬/승리로 토큰을 얻고, PayPal 젬 구매로 프리미엄 스킨을 구매합니다.</p><input id="uid" placeholder="userId"><button onclick="catalog()">카탈로그</button><div id="items" class="grid"></div><pre id="out"></pre><script>uid.value=localStorage.vs_uid||'';async function catalog(){const r=await fetch('/api/shop/catalog');const j=await r.json();items.innerHTML=j.catalog.items.map(i=>`<div class=card><b>${i.name}</b><br>${i.type}<br>가격: ${JSON.stringify(i.price)}<br><button onclick="buy('${i.id}')">구매</button></div>`).join('')+j.catalog.paypalGemPacks.map(p=>`<div class=card><b>${p.gems} 젬</b><br>$${p.priceUsd}<br><button onclick="paypal('${p.id}')">PayPal 주문</button></div>`).join('');out.textContent=JSON.stringify(j.rewardRules,null,2)}async function buy(itemId){const r=await fetch('/api/shop/purchase',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid.value,itemId})});out.textContent=JSON.stringify(await r.json(),null,2)}async function paypal(packId){const r=await fetch('/api/payments/paypal/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid.value,packId})});out.textContent=JSON.stringify(await r.json(),null,2)}catalog()</script></html>
