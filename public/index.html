<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="description" content="Voxel Strike — 브라우저 FPS 게임. No install required.">
<meta property="og:title" content="VOXEL STRIKE">
<meta property="og:description" content="무료 브라우저 FPS 게임 — 6개 글로벌 서버, 멀티플레이">
<title>VOXEL STRIKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080c10;color:#e0e0e0;font-family:'Courier New',monospace}
canvas{display:block;position:fixed;inset:0;z-index:1;cursor:crosshair}
@keyframes pulse{0%,100%{text-shadow:0 0 30px #ff3333}50%{text-shadow:0 0 50px #ff5555,0 0 90px rgba(255,0,0,.4)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes kffade{0%{opacity:1;transform:translateX(0)}80%{opacity:1}100%{opacity:0;transform:translateX(20px)}}
@keyframes chatfade{0%{opacity:1}75%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<script type="module" src="/game.js"></script>
<noscript>
  <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#080c10;color:#ff4444;font-family:monospace;font-size:18px;text-align:center;padding:20px">
    ⚠ JavaScript가 필요합니다.<br><small style="color:#666;font-size:13px;margin-top:8px;display:block">브라우저 설정에서 JavaScript를 활성화하세요.</small>
  </div>
</noscript>
