<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VOXEL Servers</title><style>body{background:#080c10;color:#eee;font-family:system-ui;padding:24px}.card{border:1px solid #733;background:#121820;border-radius:12px;padding:14px;margin:10px 0}button,input{padding:10px;border-radius:8px;margin:4px;background:#161d28;color:#fff;border:1px solid #555}</style><h1>서버</h1><nav><a href="/">게임</a> · <a href="/shop.html">상점</a> · <a href="/mypage.html">마이페이지</a> · <a href="/admin.html">어드민</a></nav><section class="card"><h2>서버 제작</h2><input id="owner" placeholder="닉네임"><button onclick="createServer()">64인 배틀로얄 서버 제작</button></section><section id="list"></section><script>async function refresh(){const r=await fetch('/api/servers');const a=await r.json();list.innerHTML=a.map(s=>`<div class=card><b>${s.flag||''} ${s.name||s.id}</b><br>${s.region||''}<br>${s.players||0}/${s.maxPlayers||20}<br><button onclick='play(${JSON.stringify(s)})'>접속</button>${s.kind==='custom'?`<button onclick="del('${s.id}')">삭제</button>`:''}</div>`).join('')}async function createServer(){const r=await fetch('/api/servers/custom',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ownerName:owner.value||'Player',maxPlayers:64,ttlSec:7200})});alert(JSON.stringify(await r.json(),null,2));refresh()}async function del(id){await fetch('/api/servers/'+id,{method:'DELETE'});refresh()}function play(s){location.href='/?server='+encodeURIComponent(s.id)}refresh()</script></html>
