<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VOXEL Admin</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#071019;color:#e8f1ff;font-family:system-ui;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:#101b28;border:1px solid #29425c;border-radius:14px;padding:16px}button,input{padding:10px;border-radius:8px;border:1px solid #446;background:#0a1220;color:#fff}button{background:#c62828;cursor:pointer}pre{white-space:pre-wrap;max-height:360px;overflow:auto}</style><h1>VOXEL Admin</h1><p>전체 서버 관리 · 치팅 관리 · 클랜 관리 · 사용자 관리 · 애드센스 · Cloudflare/GCP/KV 설정 · 이벤트</p><nav><a href="/">게임</a> · <a href="/servers.html">서버</a> · <a href="/shop.html">상점</a> · <a href="/mypage.html">마이페이지</a></nav><div class="grid"><section class="card"><h2>Overview</h2><button onclick="load('/api/admin/overview','overview')">불러오기</button><pre id="overview"></pre></section><section class="card"><h2>Cheats</h2><button onclick="load('/api/admin/cheats','cheats')">치팅 로그</button><pre id="cheats"></pre></section><section class="card"><h2>Clans</h2><button onclick="load('/api/admin/clans','clans')">클랜</button><pre id="clans"></pre></section><section class="card"><h2>Events</h2><button onclick="load('/api/admin/events','events')">이벤트</button><pre id="events"></pre></section></div><script>async function load(url,id){const r=await fetch(url);document.getElementById(id).textContent=JSON.stringify(await r.json(),null,2)}load('/api/admin/overview','overview')</script></html>
