<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VOXEL My Page</title><style>body{background:#09111a;color:#eee;font-family:system-ui;padding:24px}.card{border:1px solid #355;background:#111b26;border-radius:12px;padding:16px;margin:10px 0}button,input{padding:10px;border-radius:8px;background:#0d1520;color:#fff;border:1px solid #456}</style><h1>마이페이지</h1><nav><a href="/">게임</a> · <a href="/servers.html">서버</a> · <a href="/shop.html">상점</a></nav><div class="card"><input id="name" placeholder="닉네임"><button onclick="register()">회원 생성(D1)</button><button onclick="me()">내 정보</button><button onclick="reward()">테스트 보상 지급</button></div><pre id="out"></pre><script>let uid=localStorage.vs_uid||'';async function register(){const r=await fetch('/api/users/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:name.value||'Player'})});const j=await r.json();uid=j.userId;localStorage.vs_uid=uid;out.textContent=JSON.stringify(j,null,2)}async function me(){const r=await fetch('/api/users/me?userId='+encodeURIComponent(uid));out.textContent=JSON.stringify(await r.json(),null,2)}async function reward(){const r=await fetch('/api/rewards/grant',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid,kills:3,win:true,playMinutes:10})});out.textContent=JSON.stringify(await r.json(),null,2)}</script></html>
