name = "voxel-strike-eu-1"
main = "src/workers/router.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "./public"

[[kv_namespaces]]
binding = "KV_LEADERBOARD"
id      = "REPLACE_KV_LEADERBOARD_ID"
preview_id = "REPLACE_KV_LEADERBOARD_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id      = "REPLACE_KV_SESSIONS_ID"
preview_id = "REPLACE_KV_SESSIONS_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_ROOMS"
id      = "REPLACE_KV_ROOMS_ID"
preview_id = "REPLACE_KV_ROOMS_PREVIEW_ID"

[vars]
GAME_VERSION         = "1.0.0"
MAX_PLAYERS_PER_ROOM = "20"
SERVER_ID            = "eu-1"
SERVER_REGION        = "Frankfurt"
ROUND_DURATION_SEC   = "300"
BOT_COUNT            = "9"
